                ending: { type: '好结局', title: '希望', text: '你成功逃脱了危险，虽然经历了重重困难，但你依然活着，这就是最大的希望。' }
            }
        };

        function showScene(sceneId) {
            const scene = scenes[sceneId];
            if (!scene) return;

            gameState.currentScene = sceneId;
            if (scene.time) gameState.currentTime = scene.time;
            if (scene.distance !== undefined) gameState.distanceFromHome = scene.distance;

            if (scene.setFlags) {
                Object.keys(scene.setFlags).forEach(flag => {
                    gameState[flag] = scene.setFlags[flag];
                });
            }

            if (scene.effects) {
                if (scene.effects.inventory) gameState.inventory += scene.effects.inventory;
                if (scene.effects.radiation) gameState.radiation += scene.effects.radiation;
                if (scene.effects.savedPeople) gameState.savedPeople += scene.effects.savedPeople;
                if (scene.effects.hasTools) gameState.hasTools = true;
                if (scene.effects.hasEva) gameState.hasEva = true;
                if (scene.effects.hasAndre) gameState.hasAndre = true;
                if (scene.effects.hasKids) gameState.hasKids = true;
                if (scene.effects.didModifyCar !== undefined) gameState.didModifyCar = scene.effects.didModifyCar;
            }

            document.getElementById('sceneTitle').textContent = scene.title;
            document.getElementById('storyText').textContent = scene.text;
            
            const unknownStatus = scene.time && scene.time.includes('？？？') || scene.text && scene.text.includes('？？？');
            
            document.getElementById('gameTime').textContent = scene.time || '-';
            document.getElementById('gameDistance').textContent = scene.distance ? scene.distance + '公里' : '-';
            
            if (unknownStatus) {
                document.getElementById('gameInventory').textContent = '？？？';
                document.getElementById('gameSaved').textContent = '？？？';
                document.getElementById('gameTools').textContent = '？？？';
                document.getElementById('gameRadiation').textContent = '？？？';
            } else {
                document.getElementById('gameInventory').textContent = gameState.inventory;
                document.getElementById('gameSaved').textContent = gameState.savedPeople;
                document.getElementById('gameTools').textContent = gameState.hasTools ? '是' : '否';
                document.getElementById('gameRadiation').textContent = gameState.radiation;
            }

            const choicesList = document.getElementById('choicesList');
            choicesList.innerHTML = '';

            if (scene.choices && scene.choices.length > 0) {
                scene.choices.forEach((choice, index) => {
                    if (choice.requiresInventory && gameState.inventory < choice.requiresInventory) {
                        return;
                    }
                    setTimeout(() => {
                        const btn = document.createElement('button');
                        btn.className = 'choice-btn';
                        btn.innerHTML = `<span class="choice-label">${choice.label}</span>${choice.text}`;
                        btn.onclick = () => handleChoice(choice.id);
                        btn.style.opacity = '0';
                        btn.style.transform = 'translateY(10px)';
                        btn.style.transition = 'all 0.3s ease';
                        choicesList.appendChild(btn);
                        setTimeout(() => {
                            btn.style.opacity = '1';
                            btn.style.transform = 'translateY(0)';
                        }, 50);
                    }, index * 100);
                });
            } else if (scene.next || scene.nextScene) {
                setTimeout(() => {
                    let nextId;
                    if (typeof scene.nextScene === 'function') {
                        nextId = scene.nextScene();
                    } else {
                        nextId = scene.next.default || Object.keys(scene.next)[0];
                    }
                    if (nextId) showScene(nextId);
                }, 3000);
            }

            if (scene.ending) {
                setTimeout(() => showEnding(scene.ending), 3000);
            }
        }

        function handleChoice(choiceId) {
            const currentScene = scenes[gameState.currentScene];
            if (!currentScene || !currentScene.next) return;

            if (currentScene.effects && currentScene.effects[choiceId]) {
                const effects = currentScene.effects[choiceId];
                if (effects.inventory) gameState.inventory += effects.inventory;
                if (effects.radiation) gameState.radiation += effects.radiation;
                if (effects.savedPeople) gameState.savedPeople += effects.savedPeople;
                if (effects.hasTools) gameState.hasTools = true;
                if (effects.hasEva) gameState.hasEva = true;
                if (effects.hasAndre) gameState.hasAndre = true;
                if (effects.hasKids) gameState.hasKids = true;
                if (effects.didModifyCar !== undefined) gameState.didModifyCar = effects.didModifyCar;
                if (effects.finalChoice) gameState.finalChoice = effects.finalChoice;
                if (effects.shelterChoice) gameState.shelterChoice = effects.shelterChoice;
            }

            const nextSceneId = currentScene.next[choiceId];
            if (nextSceneId) {
                showScene(nextSceneId);
            }
        }

        function showEnding(ending) {
            document.getElementById('endingTitle').textContent = ending.title;
            document.getElementById('endingType').textContent = ending.type;
            document.getElementById('endingText').textContent = ending.text;
            document.getElementById('endingStats').innerHTML = '';
            document.getElementById('endingScreen').classList.add('show');
        }

        function restartGame() {
            gameState = {
                inventory: 0,
                radiation: 0,
                savedPeople: 0,
                currentScene: 'prologue',
                protagonist: null,
                currentTime: '2026年4月26日 凌晨1:23',
                distanceFromHome: null,
                hasTools: false,
                hasEva: false,
                hasAndre: false,
                hasKids: false,
                didModifyCar: false,
                finalChoice: null,
                shelterChoice: null
            };
            document.getElementById('endingScreen').classList.remove('show');
            showScene('prologue');
        }

        setTimeout(() => {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            showScene('prologue');
        }, 1000);
    </script>
</body>
</html>
